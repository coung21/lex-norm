model:
  pretrained_name: vinai/bartpho-syllable

data:
  train_path: data/ViLexNorm/data/train.csv
  val_path: data/ViLexNorm/data/dev.csv
  test_path: data/ViLexNorm/data/test.csv
  max_length: 64

training:
  batch_size: 16
  epochs: 10
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  output_dir: outputs/baseline
  max_samples: null  # set to int for smoke test

wandb:
  project: lex-norm
  run_name: baseline-bartpho

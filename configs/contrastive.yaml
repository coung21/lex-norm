model:
  pretrained_name: vinai/bartpho-syllable

data:
  train_path: data/ViLexNorm/data/train.csv
  val_path: data/ViLexNorm/data/dev.csv
  test_path: data/ViLexNorm/data/test.csv
  max_length: 64

stage1:
  batch_size: 32
  epochs: 5
  lr: 3.0e-5
  weight_decay: 0.01
  warmup_steps: 200
  temperature: 0.07
  output_dir: outputs/contrastive/stage1

stage2:
  batch_size: 16
  epochs: 10
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  freeze_encoder: true
  output_dir: outputs/contrastive/stage2

wandb:
  project: lex-norm
  run_name: contrastive-bartpho
